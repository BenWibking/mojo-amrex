[workspace]
authors = ["Ben Wibking <ben@wibking.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-amrex"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]
configure = """sh -lc '
if [ -n "${CRAY_MPICH_DIR:-}" ] && command -v CC >/dev/null 2>&1; then
  cmake --fresh -S . -B build \
    -DAMREX_MOJO_ENABLE_MPI=ON \
    -DCMAKE_C_COMPILER=cc \
    -DCMAKE_CXX_COMPILER=CC \
    -DMPI_C_COMPILER="$CRAY_MPICH_DIR/bin/mpicc" \
    -DMPI_CXX_COMPILER="$CRAY_MPICH_DIR/bin/mpicxx" \
    -DCMAKE_INSTALL_PREFIX="$PWD/.pixi/envs/default"
else
  env OMPI_CC=cc OMPI_CXX=c++ cmake --fresh -S . -B build \
    -DAMREX_MOJO_ENABLE_MPI=ON \
    -DCMAKE_C_COMPILER=mpicc \
    -DCMAKE_CXX_COMPILER=mpicxx \
    -DCMAKE_INSTALL_PREFIX="$PWD/.pixi/envs/default"
fi
'"""
configure-mpi = { depends-on = ["configure"], cmd = "true" }
configure-cray-mpich = "cmake --fresh -S . -B build-cray-mpich -DAMREX_MOJO_ENABLE_MPI=ON -DCMAKE_C_COMPILER=cc -DCMAKE_CXX_COMPILER=CC -DMPI_C_COMPILER=$CRAY_MPICH_DIR/bin/mpicc -DMPI_CXX_COMPILER=$CRAY_MPICH_DIR/bin/mpicxx -DCMAKE_INSTALL_PREFIX=$PWD/.pixi/envs/default"
build-capi = "env OMPI_CC=cc OMPI_CXX=c++ cmake --build build --parallel 8 --target amrex_mojo_capi_3d"
build-capi-mpi = "env OMPI_CC=cc OMPI_CXX=c++ cmake --build build --parallel 8 --target amrex_mojo_capi_3d"
build-capi-cray-mpich = "cmake --build build-cray-mpich --parallel 8 --target amrex_mojo_capi_3d"
build-tests = { depends-on = ["configure"], cmd = "env OMPI_CC=cc OMPI_CXX=c++ cmake --build build --parallel 8" }
build-tests-mpi = { depends-on = ["configure-mpi"], cmd = "env OMPI_CC=cc OMPI_CXX=c++ cmake --build build --parallel 8" }
build-tests-cray-mpich = { depends-on = ["configure-cray-mpich"], cmd = "cmake --build build-cray-mpich --parallel 8" }
install-capi = "env OMPI_CC=cc OMPI_CXX=c++ cmake --install build"
package-mojo = "mojo package mojo/amrex -o amrex.mojopkg"
install-mojo-package = "mkdir -p .pixi/envs/default/lib/mojo && mojo package mojo/amrex -o .pixi/envs/default/lib/mojo/amrex.mojopkg"
install-amrex = "env OMPI_CC=cc OMPI_CXX=c++ cmake --install build && mkdir -p .pixi/envs/default/lib/mojo && mojo package mojo/amrex -o .pixi/envs/default/lib/mojo/amrex.mojopkg"
install-amrex-cray-mpich = "cmake --install build-cray-mpich && mkdir -p .pixi/envs/default/lib/mojo && mojo package mojo/amrex -o .pixi/envs/default/lib/mojo/amrex.mojopkg"
bootstrap = { depends-on = ["configure", "build-capi", "install-amrex"] }
bootstrap-cray-mpich = { depends-on = ["configure-cray-mpich", "build-capi-cray-mpich", "install-amrex-cray-mpich"] }
build-multifab-smoke = "mojo build examples/multifab_smoke.mojo -o build/multifab_smoke"
run-multifab-smoke = "./build/multifab_smoke"
run-multifab-smoke-script = "mojo examples/multifab_smoke.mojo"
build-multifab-smoke-mojo-gpu = "mojo build examples/multifab_smoke_mojo_gpu.mojo -o build/multifab_smoke_mojo_gpu"
run-multifab-smoke-mojo-gpu = "./build/multifab_smoke_mojo_gpu"
run-multifab-smoke-mojo-gpu-script = "mojo examples/multifab_smoke_mojo_gpu.mojo"
run-multifab-mpi-exchange = { depends-on = ["configure-mpi", "build-capi-mpi", "install-mojo-package"], cmd = "mpiexec --oversubscribe --map-by slot -n 2 mojo examples/multifab_mpi_exchange.mojo" }
test-capi = { depends-on = ["build-tests"], cmd = "ctest --test-dir build --output-on-failure" }
test-capi-mpi = { depends-on = ["build-tests-mpi"], cmd = "mpiexec --oversubscribe --map-by slot -n 2 ./build/tests/capi/amrex_mojo_capi_test" }
test-mojo-runtime = { depends-on = ["build-tests", "install-mojo-package"], cmd = "mojo tests/mojo/runtime_geometry_test.mojo" }
test-mojo-runtime-mpi = { depends-on = ["build-tests-mpi", "install-mojo-package"], cmd = "mpiexec --oversubscribe --map-by slot -n 2 mojo tests/mojo/runtime_geometry_test.mojo" }
test-mojo-multifab = { depends-on = ["build-tests", "install-mojo-package"], cmd = "mojo tests/mojo/multifab_functional_test.mojo" }
test-mojo-multifab-mpi = { depends-on = ["build-tests-mpi", "install-mojo-package"], cmd = "mpiexec --oversubscribe --map-by slot -n 2 mojo tests/mojo/multifab_functional_test.mojo" }
test-mojo = { depends-on = ["test-mojo-runtime", "test-mojo-multifab"] }
test-mpi = { depends-on = ["test-capi-mpi", "test-mojo-runtime-mpi", "test-mojo-multifab-mpi"] }
test = { depends-on = ["test-capi", "test-mojo"] }
format-mojo = "mojo format mojo/amrex examples tests/mojo"

[dependencies]
mojo = "==0.26.3.0.dev2026031305"
openmpi = ">=5.0.10,<6"
